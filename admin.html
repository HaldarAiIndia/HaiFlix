<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiFlix - Admin</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/admin.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #E50914; --background: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--background); color: #f8fafc; }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .toast { transition: all 0.3s ease; transform: translateY(100%); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .brand-logo { font-weight: 800; letter-spacing: -0.05em; }
    </style>
</head>
<body class="antialiased selection:bg-red-600 selection:text-white">

<div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<div id="app" class="flex flex-col min-h-screen">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-50 hidden opacity-0 backdrop-blur-sm lg:hidden"></div>
    
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-zinc-950 border-r border-zinc-900 transform -translate-x-full lg:translate-x-0 shadow-2xl flex flex-col transition-transform duration-300">
        <div class="p-6 flex flex-col items-center border-b border-zinc-900 bg-zinc-950">
            <div class="w-16 h-16 rounded-xl p-0.5 border-2 border-red-600 overflow-hidden mb-3 shadow-lg shadow-red-600/20">
                <img src="https://i.ibb.co/twwV3QB7/favicon.png" class="w-full h-full object-cover" alt="HaiFlix">
            </div>
            <h2 class="text-xl font-black tracking-tight text-white brand-logo">Hai<span class="text-red-600">Flix</span></h2>
            <span class="px-2 py-0.5 bg-red-600/20 text-red-500 text-[10px] font-bold uppercase tracking-wider rounded mt-1 border border-red-600/30">Admin Panel</span>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-1">
            <p class="px-4 text-xs font-bold text-zinc-600 uppercase tracking-wider mb-2 mt-2">Content</p>
            <button data-section="movies" class="sidebar-item w-full flex items-center px-4 py-3 text-sm font-bold rounded-lg text-zinc-400 hover:bg-white/5 hover:text-white transition-all"><i data-lucide="film" class="w-5 h-5 mr-3 text-red-500"></i> Movies</button>
            <button data-section="series" class="sidebar-item w-full flex items-center px-4 py-3 text-sm font-bold rounded-lg text-zinc-400 hover:bg-white/5 hover:text-white transition-all"><i data-lucide="tv" class="w-5 h-5 mr-3 text-red-500"></i> Series</button>
            <button data-section="livetv" class="sidebar-item w-full flex items-center px-4 py-3 text-sm font-bold rounded-lg text-zinc-400 hover:bg-white/5 hover:text-white transition-all"><i data-lucide="satellite-dish" class="w-5 h-5 mr-3 text-red-500"></i> Live TV</button>
            <div class="my-4 border-t border-zinc-900"></div>
            <p class="px-4 text-xs font-bold text-zinc-600 uppercase tracking-wider mb-2">Settings</p>
            <button id="permissions-btn" class="w-full flex items-center px-4 py-3 text-sm font-bold rounded-lg text-zinc-400 hover:bg-white/5 hover:text-white transition-all"><i data-lucide="shield-check" class="w-5 h-5 mr-3 text-blue-500"></i> Permissions</button>
            <button id="banner-btn" class="w-full flex items-center px-4 py-3 text-sm font-bold rounded-lg text-zinc-400 hover:bg-white/5 hover:text-white transition-all"><i data-lucide="image" class="w-5 h-5 mr-3 text-green-500"></i> Banners</button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-h-screen lg:ml-72 transition-all duration-300">
        <header class="sticky top-0 z-40 glass shadow-md shadow-black/50">
            <div class="px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="menu-toggle" class="p-2 -ml-2 text-zinc-300 hover:text-white hover:bg-white/10 rounded-full transition-colors lg:hidden"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <h1 id="header-title" class="text-lg font-bold text-white">Movies</h1>
                </div>
                <button id="fab" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg shadow-lg shadow-red-900/40 transition-all text-sm font-bold"><i data-lucide="plus" class="w-4 h-4"></i><span>Add New</span></button>
            </div>
        </header>
        <main class="flex-1 p-4 sm:p-6 bg-black">
            <div id="content-area" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 sm:gap-6"></div>
        </main>
    </div>
</div>

<!-- FORM MODAL (Same as before) -->
<div id="modal-container" class="fixed inset-0 z-[60] flex items-center justify-center px-4 hidden">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-sm transition-opacity" id="modal-backdrop"></div>
    <div id="form-modal" class="relative bg-zinc-950 rounded-xl border border-zinc-800 shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col hidden transform transition-all scale-95 opacity-0">
        <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 rounded-t-xl">
            <h2 id="modal-title" class="text-lg font-bold text-white">Add Content</h2>
            <button id="close-form-btn" class="text-zinc-500 hover:text-white transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-6 overflow-y-auto custom-scrollbar">
            <form id="data-form" class="space-y-5">
                <input type="hidden" id="edit-id">
                <div class="space-y-4">
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Title</label><input type="text" id="name" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition-all text-sm text-white" required></div>
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Image URL</label><input type="url" id="image-url" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 focus:border-red-600 outline-none transition-all text-sm text-white" required></div>
                </div>
                
                <!-- MOVIE FIELDS -->
                <div id="movie-fields" class="hidden space-y-4 p-4 bg-zinc-900/50 rounded-lg border border-zinc-800">
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Source Type</label><select id="movie-source-type" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600"><option value="direct">Direct Stream</option><option value="iframe">iFrame Embed</option></select></div>
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Video URL</label><input type="text" id="movie-url" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600"></div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Category</label>
                        <select id="catalogue" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600">
                            <option value="Action/Adventure">Action/Adventure</option>
                            <option value="Comedy/Drama">Comedy/Drama</option>
                            <option value="Horror">Horror</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Hollywood">Hollywood</option>
                            <option value="Bollywood">Bollywood</option>
                            <option value="South Indian">South Indian</option>
                            <option value="Animation">Animation</option>
                            <option value="Romance">Romance</option>
                            <option value="Thriller">Thriller</option>
                        </select>
                    </div>
                </div>

                <!-- SERIES FIELDS -->
                <div id="series-fields" class="hidden space-y-4">
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Season Number</label><input type="number" id="series-number" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600"></div>
                    <div class="border-t border-zinc-800 pt-4"><label class="text-xs font-bold text-zinc-500 uppercase tracking-wider block mb-2">Episodes</label><div id="episodes-container" class="space-y-3 max-h-48 overflow-y-auto pr-1"></div><button type="button" id="add-episode-btn" class="mt-3 w-full py-2 border border-dashed border-zinc-700 text-zinc-400 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors text-xs font-bold">+ Add Episode</button></div>
                </div>

                <!-- LIVETV FIELDS -->
                <div id="livetv-fields" class="hidden space-y-4 p-4 bg-zinc-900/50 rounded-lg border border-zinc-800">
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Stream Type</label><select id="livetv-source-type" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600"><option value="m3u8">HLS (.m3u8)</option><option value="mpd">MPEG-DASH (.mpd)</option><option value="other">Other</option></select></div>
                    <div><label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Stream URL</label><input type="url" id="livetv-url" class="w-full p-3 bg-zinc-900 rounded-lg border border-zinc-800 outline-none text-sm text-white focus:border-red-600"></div>
                    <div id="livetv-drm-fields" class="hidden space-y-3 pt-2 border-t border-zinc-800"><p class="text-[10px] font-bold text-red-500 uppercase tracking-wider">DRM Configuration</p><input type="text" id="livetv-key" placeholder="License Key" class="w-full p-2.5 bg-zinc-900 rounded-lg border border-zinc-800 text-xs outline-none text-white focus:border-red-600"><input type="text" id="livetv-kid" placeholder="Key ID (KID)" class="w-full p-2.5 bg-zinc-900 rounded-lg border border-zinc-800 text-xs outline-none text-white focus:border-red-600"></div>
                </div>
                <div class="flex items-center justify-between pt-2 border-t border-zinc-800 mt-4"><span class="text-sm font-bold text-zinc-300">Publicly Visible</span><label class="switch"><input type="checkbox" id="is-public" checked><span class="slider"></span></label></div>
            </form>
        </div>
        <div class="p-5 border-t border-zinc-800 flex justify-end gap-3 bg-zinc-950 rounded-b-xl">
            <button type="button" id="cancel-btn" class="px-4 py-2 text-sm font-bold text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-lg transition-colors">Cancel</button>
            <button type="submit" form="data-form" id="save-btn" class="px-6 py-2 text-sm font-bold bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-lg shadow-red-900/20 transition-all flex items-center gap-2"><span>Save Content</span></button>
        </div>
    </div>
    
    <!-- Banner Modal -->
    <div id="banner-modal" class="relative bg-zinc-950 rounded-xl border border-zinc-800 shadow-2xl w-full max-w-md p-6 hidden">
        <h2 class="text-lg font-bold text-white mb-4">Manage Banners</h2>
        <form id="banner-form" class="flex gap-2 mb-4">
            <input type="url" id="banner-url" placeholder="Image URL" class="flex-1 p-2 bg-zinc-900 rounded-lg border border-zinc-800 text-sm text-white outline-none focus:border-red-600">
            <button type="submit" id="banner-submit-btn" class="p-2 bg-red-600 rounded-lg text-white hover:bg-red-700 transition-all">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </form>
        <div id="banner-list" class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar"></div>
        <button id="close-banner-btn" class="mt-4 w-full py-2 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 font-bold text-sm rounded-lg">Close</button>
    </div>

    <!-- Permissions Modal -->
    <div id="permissions-modal" class="relative bg-zinc-950 rounded-xl border border-zinc-800 shadow-2xl w-full max-w-md p-6 hidden">
        <h2 class="text-lg font-bold text-white mb-4">Live TV Permissions</h2>
        <div id="permissions-list" class="space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
        <button id="close-permissions-btn" class="mt-4 w-full py-2 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 font-bold text-sm rounded-lg">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDhdItehDKZJT7Ihqb-AjUtZVT7yOfYKtA", authDomain: "filmx-bfac5.firebaseapp.com", databaseURL: "https://filmx-bfac5-default-rtdb.firebaseio.com", projectId: "filmx-bfac5", storageBucket: "filmx-bfac5.appspot.com", messagingSenderId: "506741430153", appId: "1:506741430153:web:d5590373c9ca74c595b358" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentSection = 'movies', editingBannerId = null, unsubscribers = {};

    // UI Refs
    const ui = {
        sidebar: document.getElementById('sidebar'), sidebarOverlay: document.getElementById('sidebar-overlay'),
        menuToggle: document.getElementById('menu-toggle'), contentArea: document.getElementById('content-area'),
        fab: document.getElementById('fab'), modalContainer: document.getElementById('modal-container'),
        formModal: document.getElementById('form-modal'), bannerModal: document.getElementById('banner-modal'),
        permissionsModal: document.getElementById('permissions-modal'),
        dataForm: document.getElementById('data-form'), editId: document.getElementById('edit-id'),
        nameInput: document.getElementById('name'), imageUrlInput: document.getElementById('image-url'), isPublicInput: document.getElementById('is-public'),
        movieFields: document.getElementById('movie-fields'), movieUrl: document.getElementById('movie-url'), movieSource: document.getElementById('movie-source-type'), catalogue: document.getElementById('catalogue'),
        seriesFields: document.getElementById('series-fields'), seriesNum: document.getElementById('series-number'), episodesContainer: document.getElementById('episodes-container'), addEpBtn: document.getElementById('add-episode-btn'),
        livetvFields: document.getElementById('livetv-fields'), livetvUrl: document.getElementById('livetv-url'), livetvSource: document.getElementById('livetv-source-type'), livetvDrm: document.getElementById('livetv-drm-fields'), livetvKey: document.getElementById('livetv-key'), livetvKid: document.getElementById('livetv-kid'),
        bannerForm: document.getElementById('banner-form'), bannerUrl: document.getElementById('banner-url'), bannerList: document.getElementById('banner-list'), bannerSubmitBtn: document.getElementById('banner-submit-btn'), permissionsList: document.getElementById('permissions-list')
    };

    // Helpers
    const showToast = (msg, type='success') => { const t = document.createElement('div'); t.className = `toast pointer-events-auto px-4 py-3 rounded-lg shadow-lg text-white text-sm font-bold tracking-wide ${type==='success'?'bg-green-600':'bg-red-600'}`; t.innerText = msg; document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},3000); };
    const toggleSidebar = (show) => { if(show){ui.sidebar.classList.remove('-translate-x-full');ui.sidebarOverlay.classList.remove('hidden');setTimeout(()=>ui.sidebarOverlay.classList.remove('opacity-0'),10);}else{ui.sidebar.classList.add('-translate-x-full');ui.sidebarOverlay.classList.add('opacity-0');setTimeout(()=>ui.sidebarOverlay.classList.add('hidden'),300);} };
    const toggleModal = (id, show) => { const m = document.getElementById(id); if(show){ui.modalContainer.classList.remove('hidden');m.classList.remove('hidden');setTimeout(()=>m.classList.remove('scale-95','opacity-0'),10);}else{m.classList.add('scale-95','opacity-0');setTimeout(()=>{m.classList.add('hidden');ui.modalContainer.classList.add('hidden')},200);} };
    const resetForm = () => { ui.dataForm.reset(); ui.editId.value = ''; ui.episodesContainer.innerHTML = ''; ui.movieFields.classList.add('hidden'); ui.seriesFields.classList.add('hidden'); ui.livetvFields.classList.add('hidden'); };
    
    // Date Formatter for 'createdAt'
    const formatDate = (ts) => {
        if (!ts) return 'Unknown Date';
        try { return new Date(ts.seconds * 1000).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'}); }
        catch(e) { return 'Invalid Date'; }
    };

    // Listeners
    ui.menuToggle.onclick = () => toggleSidebar(true);
    ui.sidebarOverlay.onclick = () => toggleSidebar(false);
    document.getElementById('close-form-btn').onclick = () => toggleModal('form-modal', false);
    document.getElementById('cancel-btn').onclick = () => toggleModal('form-modal', false);
    document.getElementById('close-banner-btn').onclick = () => toggleModal('banner-modal', false);
    document.getElementById('close-permissions-btn').onclick = () => toggleModal('permissions-modal', false);
    ui.livetvSource.onchange = () => ui.livetvDrm.classList.toggle('hidden', ui.livetvSource.value !== 'mpd');
    ui.movieSource.onchange = () => ui.movieUrl.placeholder = ui.movieSource.value === 'iframe' ? 'Embed Code' : 'Direct Link';

    document.querySelectorAll('.sidebar-item').forEach(btn => btn.onclick = () => {
        document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('bg-white/10', 'text-white')); btn.classList.add('bg-white/10', 'text-white');
        switchSection(btn.dataset.section); toggleSidebar(false);
    });

    // CRUD & Display Logic
    function switchSection(section) {
        currentSection = section;
        document.getElementById('header-title').textContent = section.charAt(0).toUpperCase() + section.slice(1);
        if(unsubscribers.main) unsubscribers.main();
        
        try {
            unsubscribers.main = onSnapshot(collection(db, section), (snap) => {
                ui.contentArea.innerHTML = snap.docs.map(d => { 
                    const i = {id:d.id, ...d.data()};
                    
                    // -- GENERATE SECTION SPECIFIC FIELDS HTML --
                    let detailsHtml = '';
                    if(section === 'movies') {
                        detailsHtml = `
                            <div class="flex justify-between items-center text-[10px]">
                                <span class="text-zinc-500">Category</span>
                                <span class="text-red-400 font-medium">${i.catalogue || 'N/A'}</span>
                            </div>
                            <div class="flex justify-between items-center text-[10px]">
                                <span class="text-zinc-500">Source</span>
                                <span class="bg-zinc-800 px-1 rounded text-zinc-300">${i.sourceType || 'direct'}</span>
                            </div>
                            <div class="mt-1 p-1.5 bg-zinc-950/50 rounded border border-zinc-800/50">
                                <p class="text-[9px] text-zinc-500 uppercase font-bold mb-0.5">Movie URL</p>
                                <p class="text-[10px] text-zinc-400 truncate font-mono" title="${i.movieUrl}">${i.movieUrl || 'No URL'}</p>
                            </div>
                        `;
                    } else if (section === 'series') {
                        const epCount = i.episodes ? i.episodes.length : 0;
                        const epList = (i.episodes || []).map((ep, idx) => 
                            `<div class="flex gap-2 items-center py-0.5 border-b border-zinc-800/50 last:border-0">
                                <span class="text-[9px] text-zinc-500 font-bold w-3">${idx+1}</span>
                                <span class="text-[9px] text-zinc-400 truncate font-mono flex-1" title="${ep.url}">${ep.url}</span>
                             </div>`
                        ).join('');

                        detailsHtml = `
                            <div class="flex justify-between items-center text-[10px]">
                                <span class="text-zinc-500">Season</span>
                                <span class="text-white font-bold bg-red-600 px-1.5 rounded-sm text-[9px]">${i.seriesNumber || 1}</span>
                            </div>
                            <div class="mt-2">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[10px] font-bold text-zinc-400">Episodes (${epCount})</span>
                                </div>
                                <div class="bg-zinc-950 rounded border border-zinc-800 p-1.5 max-h-16 overflow-y-auto custom-scrollbar">
                                    ${epCount > 0 ? epList : '<span class="text-[9px] text-zinc-600 italic">No episodes added</span>'}
                                </div>
                            </div>
                        `;
                    } else if (section === 'livetv') {
                        detailsHtml = `
                            <div class="flex justify-between items-center text-[10px] mb-1">
                                <span class="text-zinc-500">Format</span>
                                <span class="bg-zinc-800 px-1.5 rounded text-zinc-300 uppercase font-bold text-[9px]">${i.sourceType || 'N/A'}</span>
                            </div>
                            <div class="space-y-1">
                                <div class="p-1.5 bg-zinc-950/50 rounded border border-zinc-800/50">
                                    <p class="text-[9px] text-zinc-500 uppercase font-bold mb-0.5">Stream URL</p>
                                    <p class="text-[10px] text-zinc-400 truncate font-mono" title="${i.liveTvUrl}">${i.liveTvUrl}</p>
                                </div>
                                ${(i.key || i.kid) ? `
                                <div class="grid grid-cols-2 gap-1">
                                    <div class="p-1 bg-zinc-950/50 rounded border border-zinc-800/50 overflow-hidden">
                                        <p class="text-[8px] text-red-500 font-bold">KEY</p>
                                        <p class="text-[9px] text-zinc-400 truncate" title="${i.key}">${i.key}</p>
                                    </div>
                                    <div class="p-1 bg-zinc-950/50 rounded border border-zinc-800/50 overflow-hidden">
                                        <p class="text-[8px] text-red-500 font-bold">KID</p>
                                        <p class="text-[9px] text-zinc-400 truncate" title="${i.kid}">${i.kid}</p>
                                    </div>
                                </div>` : ''}
                            </div>
                        `;
                    }

                    return `
                    <div class="group relative bg-zinc-900 rounded-xl overflow-hidden shadow-lg hover:-translate-y-1 transition-all border border-zinc-800 hover:border-red-600 flex flex-col h-full">
                        <!-- Image & Overlay -->
                        <div class="relative h-36 shrink-0 bg-black overflow-hidden border-b border-zinc-800">
                            <img src="${i.imageUrl}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" onerror="this.src='https://placehold.co/400x200/1e293b/ffffff?text=No+Image'">
                            
                            <!-- Action Buttons Overlay -->
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 backdrop-blur-sm">
                                <button onclick="window.editItem('${i.id}')" class="p-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition-transform hover:scale-110"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                                <button onclick="window.deleteItem('${i.id}')" class="p-2 bg-red-600 text-white rounded-lg shadow hover:bg-red-700 transition-transform hover:scale-110"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>

                            <!-- Status Badges -->
                            <div class="absolute top-2 left-2 flex gap-1">
                                <span class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider shadow-sm ${i.isPublic ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}">
                                    ${i.isPublic ? 'Public' : 'Private'}
                                </span>
                            </div>
                            
                            <!-- Views Badge -->
                            <div class="absolute bottom-2 right-2 px-1.5 py-0.5 bg-black/80 backdrop-blur rounded text-[10px] text-zinc-300 font-medium flex items-center gap-1 border border-white/10">
                                <i data-lucide="eye" class="w-3 h-3"></i> ${i.views || 0}
                            </div>
                        </div>

                        <!-- Content Body -->
                        <div class="p-3 flex-1 flex flex-col gap-2">
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-bold text-white text-sm leading-tight line-clamp-2" title="${i.name}">${i.name}</h3>
                            </div>
                            
                            <!-- Section Specific Data -->
                            <div class="flex-1 space-y-1.5">
                                ${detailsHtml}
                            </div>

                            <!-- Footer: Created At -->
                            <div class="mt-auto pt-2 border-t border-zinc-800 flex justify-between items-center">
                                <span class="text-[9px] text-zinc-600">Created</span>
                                <span class="text-[9px] text-zinc-400 font-mono">${formatDate(i.createdAt)}</span>
                            </div>
                        </div>
                    </div>`; 
                }).join('');
                lucide.createIcons();
            }, (error) => {
                console.error("Error fetching data:", error);
                ui.contentArea.innerHTML = `<div class="col-span-full text-center text-red-500 p-4">Error loading content. Please check your connection.</div>`;
            });
        } catch(e) { console.error("Snapshot init error", e); }
    }

    ui.fab.onclick = () => {
        resetForm();
        if(currentSection === 'movies') { ui.movieFields.classList.remove('hidden'); ui.movieSource.value = 'direct'; }
        if(currentSection === 'series') ui.seriesFields.classList.remove('hidden');
        if(currentSection === 'livetv') { ui.livetvFields.classList.remove('hidden'); ui.livetvSource.value = 'm3u8'; ui.livetvDrm.classList.add('hidden'); }
        document.getElementById('modal-title').textContent = `Add ${currentSection.slice(0,-1)}`;
        toggleModal('form-modal', true);
    };

    window.editItem = async (id) => {
        try {
            const docRef = doc(db, currentSection, id);
            const docSnap = await getDoc(docRef);
            if(!docSnap.exists()) { showToast('Item not found', 'error'); return; }
            const data = docSnap.data();
            resetForm();
            ui.editId.value = id; ui.nameInput.value = data.name; ui.imageUrlInput.value = data.imageUrl; ui.isPublicInput.checked = data.isPublic;
            
            if(currentSection === 'movies') {
                ui.movieFields.classList.remove('hidden'); ui.movieUrl.value = data.movieUrl; ui.movieSource.value = data.sourceType || 'direct';
                ui.catalogue.value = data.catalogue || 'Action/Adventure';
            } else if (currentSection === 'series') {
                ui.seriesFields.classList.remove('hidden'); ui.seriesNum.value = data.seriesNumber;
                data.episodes?.forEach(ep => ui.addEpBtn.click(ep));
            } else if (currentSection === 'livetv') {
                ui.livetvFields.classList.remove('hidden'); ui.livetvUrl.value = data.liveTvUrl; ui.livetvSource.value = data.sourceType || 'm3u8';
                ui.livetvKey.value = data.key || ''; ui.livetvKid.value = data.kid || ''; ui.livetvSource.dispatchEvent(new Event('change'));
            }
            document.getElementById('modal-title').textContent = 'Edit Item';
            toggleModal('form-modal', true);
        } catch (error) { console.error("Edit error:", error); showToast("Error loading item details", "error"); }
    };

    ui.dataForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = ui.editId.value;
        // Ensure views is preserved or init to 0, and createdAt is preserved if editing
        let data = { name: ui.nameInput.value, imageUrl: ui.imageUrlInput.value, isPublic: ui.isPublicInput.checked };
        
        if(!id) { // New item
            data.createdAt = new Date();
            data.views = 0;
        }

        if(currentSection === 'movies') { data.movieUrl = ui.movieUrl.value; data.catalogue = ui.catalogue.value; data.sourceType = ui.movieSource.value; }
        else if (currentSection === 'series') { data.seriesNumber = ui.seriesNum.value; data.episodes = Array.from(ui.episodesContainer.children).map(d => ({ url: d.querySelector('.ep-url').value, imageUrl: d.querySelector('.ep-img').value })); }
        else if (currentSection === 'livetv') { data.liveTvUrl = ui.livetvUrl.value; data.sourceType = ui.livetvSource.value; if(data.sourceType==='mpd'){data.key=ui.livetvKey.value;data.kid=ui.livetvKid.value;} }
        
        try {
            if(id) await setDoc(doc(db, currentSection, id), data, {merge: true});
            else await addDoc(collection(db, currentSection), data);
            toggleModal('form-modal', false); showToast('Content saved successfully!');
        } catch(err) { showToast(err.message, 'error'); }
    };

    window.deleteItem = async (id) => { if(confirm('Delete this item?')) { await deleteDoc(doc(db, currentSection, id)); showToast('Deleted'); } };
    ui.addEpBtn.addEventListener('click', (ep = {url:'', imageUrl:''}) => {
        const div = document.createElement('div'); div.className = 'flex gap-2 items-center bg-zinc-900 p-2 rounded-lg border border-zinc-800';
        div.innerHTML = `<div class="flex-1 space-y-2"><input type="text" value="${ep.url||''}" class="ep-url w-full p-1.5 bg-black border border-zinc-700 rounded text-xs outline-none text-zinc-300 focus:border-red-600" placeholder="Video URL"><input type="text" value="${ep.imageUrl||''}" class="ep-img w-full p-1.5 bg-black border border-zinc-700 rounded text-xs outline-none text-zinc-300 focus:border-red-600" placeholder="Image URL"></div><button type="button" class="text-red-500 p-1 hover:text-red-400" onclick="this.parentElement.remove()"><i data-lucide="x" class="w-4 h-4"></i></button>`;
        ui.episodesContainer.appendChild(div); lucide.createIcons();
    });

    // Banner & Perms Logic (Same as before)
    document.getElementById('banner-btn').onclick = () => { toggleSidebar(false); toggleModal('banner-modal', true); editingBannerId = null; ui.bannerUrl.value = ''; ui.bannerSubmitBtn.innerHTML = '<i data-lucide="plus" class="w-5 h-5"></i>'; lucide.createIcons(); onSnapshot(collection(db, 'banners'), s => { ui.bannerList.innerHTML = s.docs.map(d => `<div class="flex justify-between items-center p-2 bg-zinc-900 rounded border border-zinc-800 mb-2"><img src="${d.data().url}" class="w-12 h-8 object-cover rounded border border-zinc-700"><div class="flex gap-2"><button onclick="window.editBanner('${d.id}', '${d.data().url}')" class="text-blue-500 hover:text-blue-400 p-1 bg-blue-500/10 rounded"><i data-lucide="pencil" class="w-4 h-4"></i></button><button onclick="window.delBanner('${d.id}')" class="text-red-500 hover:text-red-400 p-1 bg-red-500/10 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join(''); lucide.createIcons(); }); };
    window.editBanner = (id, url) => { editingBannerId = id; ui.bannerUrl.value = url; ui.bannerSubmitBtn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i>'; lucide.createIcons(); ui.bannerUrl.focus(); };
    ui.bannerForm.onsubmit = async (e) => { e.preventDefault(); if(!ui.bannerUrl.value) return; try { if(editingBannerId) { await updateDoc(doc(db, 'banners', editingBannerId), { url: ui.bannerUrl.value }); showToast('Banner updated'); editingBannerId = null; ui.bannerSubmitBtn.innerHTML = '<i data-lucide="plus" class="w-5 h-5"></i>'; } else { await addDoc(collection(db, 'banners'), { url: ui.bannerUrl.value }); showToast('Banner added'); } ui.bannerUrl.value = ''; lucide.createIcons(); } catch (err) { showToast(err.message, 'error'); } };
    window.delBanner = async (id) => { if(confirm('Delete banner?')) await deleteDoc(doc(db, 'banners', id)); };
    document.getElementById('permissions-btn').onclick = () => { toggleSidebar(false); toggleModal('permissions-modal', true); onSnapshot(collection(db, 'livetv'), s => ui.permissionsList.innerHTML = s.docs.map(d => `<div class="flex justify-between p-3 bg-zinc-900 rounded border border-zinc-800 mb-2"><span class="text-sm font-bold text-zinc-300">${d.data().name}</span><label class="switch"><input type="checkbox" ${d.data().isPublic?'checked':''} onchange="window.togglePerm('${d.id}', this.checked)"><span class="slider"></span></label></div>`).join('')); };
    window.togglePerm = async (id, val) => updateDoc(doc(db, 'livetv', id), { isPublic: val });

    switchSection('movies');
    lucide.createIcons();
</script>
</body>
</html>
